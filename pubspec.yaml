  intl: ^0.20.2
  url_launcher: ^6.3.1
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.9
  flutter_local_notifications: ^19.4.1
  file_picker: ^10.2.0
  timeago: ^3.7.1
  fluttertoast: ^8.2.12
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.7.0
  permission_handler: ^12.0.1
  printing: ^5.12.0
  pdf: ^3.11.3
  share_plus: ^11.1.0
  sms_autofill: ^2.4.1
  flutter_rating_bar: ^4.0.1
  http: ^1.6.0
  country_code_picker: ^3.4.1
  camera: ^0.11.3
  socket_io_client: ^3.1.4
  record: ^6.2.0
  audioplayers: ^6.5.1
  get_time_ago: ^2.3.2


dev_dependencies:
  flutter_test:
    sdk: flutter

icons_launcher:
  image_path: "assets/images/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true





  flutter_lints: ^5.0.0


flutter:


  uses-material-design: true


  assets:
    - assets/images/
    - assets/gifs/



