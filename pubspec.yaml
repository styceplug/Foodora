name: foodora
description: "A new Flutter project."


version: 1.0.0

environment:
  sdk: ^3.7.2


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  get: ^4.7.3
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1
  marquee: ^2.3.0
  dotted_border: ^3.0.1
